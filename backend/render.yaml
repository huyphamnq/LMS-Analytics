services:
  - type: web
    name: lms-analytics-api
    runtime: python
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn app:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: ENV
        value: production
      - key: API_RELOAD
        value: "False"
      - key: SECRET_KEY
        sync: false
      - key: MONGODB_URI
        sync: false
      - key: MONGODB_DB_NAME
        value: lms_analytics
      - key: GEMINI_API_KEY
        sync: false
      - key: CORS_ORIGINS
        sync: false
